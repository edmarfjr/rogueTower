name: towerrogue
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.23.0
  flame_audio: ^2.1.0
  material_design_icons_flutter: ^7.0.7296
  shared_preferences: ^2.2.2
  flutter_soloud: ^3.4.10
  google_mobile_ads: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/sprites/
    - assets/audio/
    - assets/audio/music/
    - assets/audio/sfx/wav/
    - assets/audio/sfx/mp3/
  shaders:
    - shaders/crt.frag

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png" # Coloque o caminho exato da sua imagem aqui
  min_sdk_version: 21 
  web:
    generate: true
    image_path: "assets/images/icon.png"